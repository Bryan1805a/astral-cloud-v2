services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: astral
      POSTGRES_PASSWORD: astral
      POSTGRES_DB: astral
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astral"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    environment:
      - DATABASE_URL=postgresql://astral:astral@postgres:5432/astral
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: tail -f /dev/null

volumes:
  postgres_data:
  redis_data:
  node_modules:
  pnpm_store:
